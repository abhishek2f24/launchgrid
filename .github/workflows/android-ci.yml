name: Android CI

on:
  pull_request:
    paths: ['launchgrid-android/**']
  push:
    branches: [main]
    paths: ['launchgrid-android/**']

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: launchgrid-android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Build debug APK
        run: chmod +x gradlew && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: launchgrid-android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
